services:
  web:
    build: .
    image: voxsecundus/board-game-leaderboard:latest
    ports:
      - "3000:80"
    environment:
      APP_PASSWORD: ${APP_PASSWORD}
      RAILS_ENV: production
    volumes:
      - storage_data:/rails/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/up"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  storage_data:
